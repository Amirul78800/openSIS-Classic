name: Docker Image CI

on:
  push:
    branches: [ "deployment" ]
  pull_request:
    branches: [ "deployment" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Checkout code dari repo
    - uses: actions/checkout@v4
    
    # 2. Setup Docker Buildx (untuk build yang lebih efisien)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    # 3. Login ke Docker Hub (guna secrets)
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    # 4. Extract metadata untuk tag (repo name + timestamp)
    - name: Extract metadata
      id: meta
      run: |
        REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')
        TIMESTAMP=$(date +%s)
        echo "image_name=${REPO_NAME}" >> $GITHUB_OUTPUT
        echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
    
    # 5. Build dan push image ke Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.meta.outputs.image_name }}:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.timestamp }}
    
    # 6. (Optional) Simpan image digest untuk rujukan
    - name: Image digest
      run: echo "Image built and pushed successfully"
